<body class="bg-surface-container-lowest text-on-surface min-h-screen flex flex-col font-sans relative overflow-hidden selection:bg-primary/20 selection:text-primary">

<div class="absolute bottom-[-10%] left-[-10%] w-[400px] h-[400px] bg-primary/5 rounded-full blur-[60px] pointer-events-none"></div>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col px-container-padding pt-20 pb-safe z-10 max-w-md mx-auto w-full">
<!-- Header Section -->
<header class="mb-section-margin">
<h1 class="text-primary font-headline-lg-mobile text-headline-lg-mobile tracking-tight mb-2">StaffEra</h1>
<p class="text-body-md font-body-md text-on-surface-variant">Enter your phone number to continue.</p>
</header>
<!-- Form Section -->
<div class="flex-1 flex flex-col gap-unit">
<!-- Input Area -->
<div class="flex items-stretch gap-3 mb-4">
<!-- Country Picker -->
<button class="flex items-center gap-2 bg-surface-container-low hover:bg-surface-container transition-colors rounded-lg px-3 py-4 border border-transparent focus:border-primary focus:ring-1 focus:ring-primary outline-none h-[64px]">
<span class="text-body-md">🇺🇸</span>
<span class="text-label-md font-label-md text-on-surface">+1</span>
<span class="material-symbols-outlined text-on-surface-variant text-[20px]">keyboard_arrow_down</span>
</button>
<!-- Phone Input (Ghost Style) -->
<div class="ghost-input relative flex-1 bg-surface-container-low rounded-lg pt-6 pb-2 px-4 border border-transparent focus-within:bg-surface-container-lowest focus-within:border-primary focus-within:ring-1 focus-within:ring-primary transition-all h-[64px]">
<input autocomplete="tel" class="w-full bg-transparent outline-none text-body-md font-body-md text-on-surface placeholder-transparent peer" id="phone" placeholder="(555) 000-0000" type="tel"/>
<label class="absolute top-4 left-4 text-caption font-caption text-on-surface-variant transition-all transform origin-left pointer-events-none" for="phone">Phone Number</label>
</div>
</div>
<!-- Primary Action -->
<!-- Using the specified Secondary Gradient (#662D8C to #ED1E79) for primary buttons -->
<button class="w-full h-[56px] rounded-lg bg-gradient-to-r from-[#662D8C] to-[#ED1E79] text-white text-label-md font-label-md shadow-[0_8px_20px_rgba(237,30,121,0.25)] active:scale-95 transition-transform flex items-center justify-center mb-section-margin">

<script>
        // Simple script to handle input focus state simulation if needed, 
        // though CSS :focus-within handles the visual floating label well.
        const phoneInput = document.getElementById('phone');
        
        // Auto-format simplistic phone number (just for demonstration of interaction)
        phoneInput.addEventListener('input', function (e) {
            let x = e.target.value.replace(/\D/g, '').match(/(\d{0,3})(\d{0,3})(\d{0,4})/);
            e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
        });
    </script>
