<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>StaffEra - Booking Flow</title>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                    "surface-bright": "#fcf8ff",

                    "on-primary-fixed-variant": "#373a9b",

                    "on-error": "#ffffff",
                    "on-surface-variant": "#464652",
                    "on-tertiary": "#ffffff",
                    "on-secondary-container": "#602786",
                    "secondary-fixed": "#f4daff",
                    "inverse-primary": "#c0c1ff",
                    "inverse-surface": "#303036",

                    "tertiary-fixed": "#ffdbcb",
                    "on-secondary-fixed": "#2f004c",
                    "primary": "#15157d",

                    "background": "#fcf8ff",

                    "on-primary": "#ffffff",
                    "surface-container-highest": "#e4e1ea",
                    "tertiary-fixed-dim": "#ffb692",
                    "on-secondary": "#ffffff",
                    "on-surface": "#1b1b21",
                    "on-error-container": "#93000a",
                    "outline": "#777683",
                    "surface": "#fcf8ff",
                    "secondary-fixed-dim": "#e3b5ff",
                    "on-tertiary-fixed-variant": "#773207",

            "spacing": {

        }
      }

<style>
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background antialiased md:bg-surface-container-high md:py-10">
<main class="bg-surface min-h-screen relative md:max-w-md md:mx-auto md:min-h-[850px] md:rounded-[40px] md:shadow-2xl md:overflow-hidden md:border md:border-outline-variant/20 pb-[120px]">
<!-- Transactional Header -->
<header class="sticky top-0 z-50 bg-surface/80 backdrop-blur-xl px-container-padding py-4 flex items-center gap-4">
<button aria-label="Go back" class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<h1 class="text-headline-md font-headline-md text-on-surface">Book Service</h1>
</header>
<!-- Visual Stepper -->
<div class="px-container-padding py-6 flex items-center justify-between relative">
<div class="absolute left-10 right-10 top-1/2 -translate-y-1/2 h-0.5 bg-surface-variant -z-10"></div>
<div class="flex flex-col items-center gap-2 bg-surface px-2">
<div class="w-8 h-8 rounded-full bg-primary text-on-primary flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-[18px]">check</span>
</div>
<span class="text-caption font-caption text-primary">Location</span>
</div>
<div class="flex flex-col items-center gap-2 bg-surface px-2 relative">
<div class="w-8 h-8 rounded-full border-2 border-primary bg-primary-fixed text-primary flex items-center justify-center font-bold text-label-md relative">
<div class="absolute inset-0 rounded-full bg-primary/20 blur-md -z-10"></div>
                2
            </div>
<span class="text-caption font-caption text-primary font-bold">Schedule</span>
</div>
<div class="flex flex-col items-center gap-2 bg-surface px-2">
<div class="w-8 h-8 rounded-full bg-surface-container text-on-surface-variant flex items-center justify-center font-bold text-label-md">
                3
            </div>
<span class="text-caption font-caption text-on-surface-variant">Payment</span>
</div>
</div>
<!-- Address Section (Summarized) -->
<section class="px-container-padding py-4 flex flex-col gap-unit">
<h2 class="text-body-lg font-headline-md text-on-surface mb-2">Where?</h2>
<div class="bg-surface-container-low border border-primary/20 rounded-xl p-4 flex items-start gap-4 shadow-sm relative overflow-hidden group cursor-pointer hover:bg-surface-container transition-colors">
<div class="absolute top-0 right-0 p-4">
<button class="text-primary text-label-md font-label-md opacity-80 group-hover:opacity-100">Edit</button>
</div>
<div class="w-12 h-12 rounded-full bg-primary-fixed flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-primary">home</span>
</div>
<div class="flex flex-col pr-10">
<span class="text-body-md font-label-md text-on-surface font-bold">Primary Residence</span>
<span class="text-body-md font-body-md text-on-surface-variant mt-1">123 Luxury Lane, Apt 4B<br/>San Francisco, CA 94105</span>
</div>
</div>
<button class="mt-2 border-2 border-dashed border-outline-variant/50 rounded-xl p-4 text-center text-primary font-label-md flex justify-center items-center gap-2 hover:bg-primary-fixed/30 transition-colors">
<span class="material-symbols-outlined">add</span>
            Add New Address
        </button>
</section>
<div class="h-px bg-surface-variant mx-container-padding my-6"></div>
<!-- Schedule Section -->
<section class="px-container-padding flex flex-col gap-gutter">
<h2 class="text-body-lg font-headline-md text-on-surface mb-2">When?</h2>
<!-- Date Picker -->
<div class="flex overflow-x-auto gap-3 pb-4 snap-x hide-scrollbar -mx-container-padding px-container-padding">
<button class="snap-start shrink-0 w-[72px] h-[88px] rounded-xl border border-outline-variant/30 bg-surface flex flex-col items-center justify-center gap-1 hover:bg-surface-container transition-all">
<span class="text-caption font-caption text-on-surface-variant uppercase">Mon</span>
<span class="text-headline-md font-headline-md text-on-surface">14</span>
</button>
<button class="snap-start shrink-0 w-[72px] h-[88px] rounded-xl bg-primary text-on-primary flex flex-col items-center justify-center gap-1 shadow-[0_4px_16px_rgba(21,21,125,0.25)] transition-all scale-105 border border-primary relative z-10">
<span class="text-caption font-caption text-on-primary/80 uppercase">Tue</span>
<span class="text-headline-md font-headline-md text-on-primary">15</span>
</button>
<button class="snap-start shrink-0 w-[72px] h-[88px] rounded-xl border border-outline-variant/30 bg-surface flex flex-col items-center justify-center gap-1 hover:bg-surface-container transition-all">
<span class="text-caption font-caption text-on-surface-variant uppercase">Wed</span>
<span class="text-headline-md font-headline-md text-on-surface">16</span>
</button>
<button class="snap-start shrink-0 w-[72px] h-[88px] rounded-xl border border-outline-variant/30 bg-surface flex flex-col items-center justify-center gap-1 hover:bg-surface-container transition-all">
<span class="text-caption font-caption text-on-surface-variant uppercase">Thu</span>
<span class="text-headline-md font-headline-md text-on-surface">17</span>
</button>
<button class="snap-start shrink-0 w-[72px] h-[88px] rounded-xl border border-outline-variant/30 bg-surface flex flex-col items-center justify-center gap-1 hover:bg-surface-container transition-all">
<span class="text-caption font-caption text-on-surface-variant uppercase">Fri</span>
<span class="text-headline-md font-headline-md text-on-surface">18</span>
</button>
</div>
<!-- Time Slots -->
<div class="mt-2">
<span class="text-label-md font-label-md text-on-surface-variant mb-3 block">Morning</span>
<div class="grid grid-cols-3 gap-3">
<button class="py-3 rounded-lg border border-outline-variant/30 text-body-md font-body-md text-on-surface bg-surface hover:border-primary/50 transition-colors">08:00 AM</button>
<button class="py-3 rounded-lg border border-outline-variant/30 text-body-md font-body-md text-on-surface bg-surface hover:border-primary/50 transition-colors">09:30 AM</button>
<button class="py-3 rounded-lg border-2 border-primary bg-primary-fixed text-primary font-bold text-body-md shadow-sm transition-all relative">
                    11:00 AM
                    <div class="absolute inset-0 rounded-lg bg-primary/10 blur-sm -z-10"></div>
</button>
</div>
<span class="text-label-md font-label-md text-on-surface-variant mb-3 mt-6 block">Afternoon</span>
<div class="grid grid-cols-3 gap-3">
<button class="py-3 rounded-lg border border-outline-variant/30 text-body-md font-body-md text-on-surface bg-surface hover:border-primary/50 transition-colors">12:30 PM</button>
<button class="py-3 rounded-lg border border-outline-variant/30 text-body-md font-body-md text-outline bg-surface-container-lowest cursor-not-allowed opacity-40">02:00 PM</button>
<button class="py-3 rounded-lg border border-outline-variant/30 text-body-md font-body-md text-on-surface bg-surface hover:border-primary/50 transition-colors">03:30 PM</button>
</div>
</div>
</section>
<!-- Sticky Footer -->
<div class="fixed bottom-0 left-0 w-full md:absolute md:bottom-0 bg-surface/80 backdrop-blur-2xl border-t border-white/40 p-container-padding pb-8 z-50 shadow-[0_-8px_30px_rgba(46,49,146,0.05)]">
<button class="w-full bg-gradient-to-r from-secondary to-[#ED1E79] text-on-secondary py-4 rounded-xl text-label-md font-label-md shadow-[0_8px_20px_rgba(125,68,164,0.25)] hover:opacity-90 hover:scale-[0.98] active:scale-95 transition-all flex justify-center items-center gap-2 relative overflow-hidden group">
<span class="relative z-10 flex items-center gap-2">
                Continue to Payment
                <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</span>
<div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-out z-0"></div>
</button>
</div>
</main>
<script>
    // Simple micro-interaction for time slots
    const timeButtons = document.querySelectorAll('.grid-cols-3 button:not(.cursor-not-allowed)');
    timeButtons.forEach(btn => {
        btn.addEventListener('click', function() {
            // Remove active classes from all
            timeButtons.forEach(b => {
                b.className = 'py-3 rounded-lg border border-outline-variant/30 text-body-md font-body-md text-on-surface bg-surface hover:border-primary/50 transition-colors';
                b.innerHTML = b.textContent; // remove inner glow div if present
            });
            
            // Add active classes to clicked
            this.className = 'py-3 rounded-lg border-2 border-primary bg-primary-fixed text-primary font-bold text-body-md shadow-sm transition-all relative';
            this.innerHTML = `${this.textContent} <div class="absolute inset-0 rounded-lg bg-primary/10 blur-sm -z-10"></div>`;
        });
    });
</script>
</body></html>
